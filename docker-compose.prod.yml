services:
    app:
        build: docker/php
        command: sh -c "mkdir -p /tmp/laravel-views && chmod 777 /tmp/laravel-views && chmod -R 777 storage bootstrap/cache && exec php-fpm"
        volumes:
            - .:/var/www/html
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        restart: unless-stopped

    queue:
        build: docker/php
        command: sh -c "mkdir -p /tmp/laravel-views && chmod 777 /tmp/laravel-views && exec php artisan queue:work redis --tries=3 --sleep=1"
        volumes:
            - .:/var/www/html
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        restart: unless-stopped

    # Внутренний веб-сервер стека; наружу смотрит только на локальный порт —
    # системный nginx хоста проксирует kanban.nepalimsya.ru сюда
    webserver:
        image: nginx:1.27-alpine
        ports:
            - "127.0.0.1:8090:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
            - centrifugo
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${DB_DATABASE:-kanban}
            POSTGRES_USER: ${DB_USERNAME:-kanban}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kanban} -d ${DB_DATABASE:-kanban}"]
            interval: 5s
            timeout: 3s
            retries: 10
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        restart: unless-stopped

    centrifugo:
        image: centrifugo/centrifugo:v5
        command: centrifugo
        environment:
            CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET}
            CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
            CENTRIFUGO_ALLOWED_ORIGINS: ${APP_URL:-https://kanban.nepalimsya.ru}
            CENTRIFUGO_ALLOW_SUBSCRIBE_FOR_CLIENT: "true"
        restart: unless-stopped

    # Одноразовая сборка фронтенда
    node:
        image: node:20-alpine
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        command: sh -c "npm install && npm run build"
        restart: "no"

volumes:
    pgdata:
