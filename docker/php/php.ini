; Оптимизация под bind mount на Windows: каждый stat() дорогой,
; поэтому кэшируем результаты компиляции и realpath агрессивно
[opcache]
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
; НЕ проверять изменения PHP-файлов на диске: через Windows bind mount каждый
; stat() стоит дорого. После правок PHP-кода нужен `docker compose restart app queue`
opcache.validate_timestamps = 0

[PHP]
realpath_cache_size = 4096K
realpath_cache_ttl = 600
memory_limit = 512M
